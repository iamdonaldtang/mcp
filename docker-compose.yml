services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskon
      POSTGRES_PASSWORD: taskon
      POSTGRES_DB: taskon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskon"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: taskon
      DB_PASSWORD: taskon
      DB_NAME: taskon
      DB_SSLMODE: disable
      JWT_SECRET: taskon-dev-secret-change-in-production
      GIN_MODE: release
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
